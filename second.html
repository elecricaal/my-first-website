<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="nav">
            <span class="nav-logo">My Website</span>
            <ul class="nav-links">
                <li><a href="hello.html" class="nav-link">Home</a></li>
                <li><a href="second.html" class="nav-link active">Second Page</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="card">
            <h1>What's your mood like today?</h1>
            <div class="mood-selector">
                <button class="mood-btn" data-mood="sad">
                    <span class="mood-emoji">😿</span>
                    <span>Sad</span>
                </button>
                <button class="mood-btn" data-mood="neutral">
                    <span class="mood-emoji">😼</span>
                    <span>Neutral</span>
                </button>
                <button class="mood-btn" data-mood="happy">
                    <span class="mood-emoji">😸</span>
                    <span>Happy</span>
                </button>
            </div>
            <p class="mood-message" id="mood-message"></p>
            <a href="hello.html" class="back-link" id="back-btn">← Go Back</a>
        </div>
    </main>
    <footer>
        <p>Made by Electricaal &mdash; 2026</p>
    </footer>
    <script>
        // Wait for the page content to fully load, then fade in the main section
        document.addEventListener('DOMContentLoaded', function () {
            var main = document.querySelector('main');
            main.classList.add('visible');

            // Mood selector
            var moodBtns = document.querySelectorAll('.mood-btn');
            var moodMessage = document.querySelector('#mood-message');

            var messages = {
                sad:     "That's okay. Every feeling is valid. 💙",
                neutral: "A calm day — that's perfectly fine. 🌤️",
                happy:   "Love to hear it! Keep that energy going. 🌟"
            };

            moodBtns.forEach(function (btn) {
                btn.addEventListener('click', function () {
                    // Remove selected state from all buttons
                    moodBtns.forEach(function (b) {
                        b.classList.remove('selected');
                    });
                    // Highlight the clicked one
                    btn.classList.add('selected');
                    // Show the matching message
                    var mood = btn.getAttribute('data-mood');
                    moodMessage.textContent = messages[mood];
                });
            });

            // Back button
            var backBtn = document.querySelector('#back-btn');
            backBtn.addEventListener('click', function () {
                window.location.href = 'hello.html';
            });
        });
    </script>
</body>
</html>
