<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="nav">
            <span class="nav-logo">My Website</span>
            <ul class="nav-links">
                <li><a href="hello.html" class="nav-link">Home</a></li>
                <li><a href="second.html" class="nav-link active">Second Page</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="card">
            <h1>What's your mood like today?</h1>
            <div class="mood-selector">
                <button class="mood-btn" data-mood="sad">
                    <span class="mood-emoji">😿</span>
                    <span>Sad</span>
                </button>
                <button class="mood-btn" data-mood="neutral">
                    <span class="mood-emoji">😼</span>
                    <span>Neutral</span>
                </button>
                <button class="mood-btn" data-mood="happy">
                    <span class="mood-emoji">😸</span>
                    <span>Happy</span>
                </button>
            </div>
            <p class="mood-message" id="mood-message"></p>

            <form class="contact-form" id="contact-form" novalidate>
                <h2 class="form-title">Let's chat</h2>
                <div class="form-group">
                    <label class="form-label" for="name">What's your name?</label>
                    <input class="form-input" type="text" id="name" name="name" placeholder="Your name" autocomplete="name">
                    <span class="form-error" id="name-error"></span>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">What's your email</label>
                    <input class="form-input" type="email" id="email" name="email" placeholder="your@email.com" autocomplete="email">
                    <span class="form-error" id="email-error"></span>
                </div>
                <div class="form-group">
                    <label class="form-label" for="message">Share a little more about how you feel</label>
                    <textarea class="form-input form-textarea" id="message" name="message" placeholder="Tell me anything…" rows="4"></textarea>
                    <span class="form-error" id="message-error"></span>
                </div>
                <button type="submit" class="btn">Contact me</button>
                <p class="form-success" id="form-success"></p>
            </form>

            <a href="hello.html" class="back-link" id="back-btn">← Go Back</a>
        </div>
    </main>
    <footer>
        <p>Made by Electricaal &mdash; 2026</p>
    </footer>
    <script>
        // Wait for the page content to fully load, then fade in the main section
        document.addEventListener('DOMContentLoaded', function () {
            var main = document.querySelector('main');
            main.classList.add('visible');

            // Mood selector
            var moodBtns = document.querySelectorAll('.mood-btn');
            var moodMessage = document.querySelector('#mood-message');

            var messages = {
                sad:     "That's okay. Every feeling is valid. 💙",
                neutral: "A calm day — that's perfectly fine. 🌤️",
                happy:   "Love to hear it! Keep that energy going. 🌟"
            };

            var contactForm = document.querySelector('#contact-form');

            moodBtns.forEach(function (btn) {
                btn.addEventListener('click', function () {
                    // Remove selected state from all buttons
                    moodBtns.forEach(function (b) {
                        b.classList.remove('selected');
                    });
                    // Highlight the clicked one
                    btn.classList.add('selected');
                    // Show the matching message
                    var mood = btn.getAttribute('data-mood');
                    moodMessage.textContent = messages[mood];
                    // Reveal the form
                    contactForm.classList.add('visible');
                });
            });

            // Form validation
            contactForm.addEventListener('submit', function (e) {
                e.preventDefault();

                var nameInput   = document.querySelector('#name');
                var emailInput  = document.querySelector('#email');
                var msgInput    = document.querySelector('#message');
                var nameError   = document.querySelector('#name-error');
                var emailError  = document.querySelector('#email-error');
                var msgError    = document.querySelector('#message-error');
                var formSuccess = document.querySelector('#form-success');

                // Clear previous messages
                nameError.textContent  = '';
                emailError.textContent = '';
                msgError.textContent   = '';
                formSuccess.textContent = '';

                var valid = true;

                // Validate name
                if (nameInput.value.trim() === '') {
                    nameError.textContent = 'Please enter your name.';
                    valid = false;
                }

                // Validate email — must contain @ and a dot after it
                var email = emailInput.value.trim();
                if (email === '' || !email.includes('@') || email.indexOf('.', email.indexOf('@')) === -1) {
                    emailError.textContent = 'Please enter a valid email address.';
                    valid = false;
                }

                // Validate message
                if (msgInput.value.trim() === '') {
                    msgError.textContent = 'Tell me more. I\'d love to hear it!';
                    valid = false;
                }

                if (valid) {
                    // Send data to Formspree
                    fetch('https://formspree.io/f/myknqwqj', {
                        method: 'POST',
                        headers: { 'Accept': 'application/json' },
                        body: new FormData(contactForm)
                    })
                    .then(function (response) {
                        if (response.ok) {
                            formSuccess.textContent = 'Thanks! We\'ll be in touch. 🐱';
                            nameInput.value  = '';
                            emailInput.value = '';
                            msgInput.value   = '';
                        } else {
                            formSuccess.style.color = 'var(--color-error)';
                            formSuccess.textContent = 'Something went wrong. Please try again.';
                        }
                    })
                    .catch(function () {
                        formSuccess.style.color = 'var(--color-error)';
                        formSuccess.textContent = 'No connection. Please try again later.';
                    });
                }
            });

            // Back button
            var backBtn = document.querySelector('#back-btn');
            backBtn.addEventListener('click', function () {
                window.location.href = 'hello.html';
            });
        });
    </script>
</body>
</html>
