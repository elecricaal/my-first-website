<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="nav">
            <span class="nav-logo">My Website</span>
            <ul class="nav-links">
                <li><a href="hello.html" class="nav-link active">Home</a></li>
                <li><a href="second.html" class="nav-link">Second Page</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="card">
            <h1>Hello World</h1>
            <img src="cat-waving.gif" alt="A cat waving hello" class="cat-img">
            <button class="btn" id="go-btn">Click Here</button>
        </div>
    </main>
    <footer>
        <p>Made by Electricaal &mdash; 2026</p>
    </footer>
    <script>
        // Wait for the page content to fully load, then fade in the main section
        document.addEventListener('DOMContentLoaded', function () {
            var main = document.querySelector('main');
            main.classList.add('visible');

            var btn = document.querySelector('#go-btn');
            btn.addEventListener('click', function () {
                btn.textContent = 'On my way!';
                setTimeout(function () {
                    window.location.href = 'second.html';
                }, 600);
            });
        });
    </script>
</body>
</html>
